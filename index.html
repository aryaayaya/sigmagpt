<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SigmaGPT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="loginPage">
  <div class="login-box">
    <div class="login-wordmark">Sigma<span>GPT</span></div>
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button class="login-btn" onclick="login()">Sign In</button>
  </div>
</div>

<!-- APP -->
<div class="app hidden" id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Sigma<span>GPT</span></div>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New conversation
    </button>

    <div class="history-label">Recent</div>
    <div class="chat-history" id="history"></div>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar" id="avatarInitial">U</div>
        <div class="user-info">
          <div class="user-name" id="displayName">User</div>
          <div class="user-status">● Online</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Log out">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="chat-header">
      <div class="model-dot"></div>
      <div class="model-label">SigmaGPT</div>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <h3>How can I help you?</h3>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Message SigmaGPT...">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
<script src="index.js"></script>
</body>
</html>
